<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Tandava | Open Source Studio Management</title>
    <meta name="description" content="Open-source studio management software for yoga, pilates, and movement studios. Self-host your data, customize everything, no subscription fees." />
    <meta name="author" content="Tandava" />
    <meta name="keywords" content="yoga studio software, studio management, open source, booking system, class scheduling, vinyasa, yin yoga, meditation, wellness" />
    <link rel="canonical" href="https://tandava.yoga" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="Tandava | Open Source Studio Management" />
    <meta property="og:description" content="Free, open-source studio management for yoga, pilates, and movement studios." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tandava | Open Source Studio Management" />
    <meta name="twitter:description" content="Free, open-source studio management for yoga, pilates, and movement studios." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Google Fonts for Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // GitHub Pages SPA route restoration
      // When 404.html redirects, it encodes the original path as a query param
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));

      // Register service worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
