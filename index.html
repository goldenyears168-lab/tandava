<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tandava" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Tandava | Open Source Studio Management</title>
    <meta name="description" content="Open-source studio management software for yoga, pilates, and movement studios. Self-host your data, customize everything, no subscription fees." />
    <meta name="author" content="Tandava" />
    <meta name="keywords" content="yoga studio software, studio management, open source, booking system, class scheduling" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="Tandava | Open Source Studio Management" />
    <meta property="og:description" content="Free, open-source studio management for yoga, pilates, and movement studios." />
    <meta property="og:type" content="website" />
    <!-- Note: og:image requires a hosted image - add when available -->

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tandava | Open Source Studio Management" />
    <meta name="twitter:description" content="Free, open-source studio management for yoga, pilates, and movement studios." />
    <!-- Note: twitter:image requires a hosted image - add when available -->

    <!-- Google Fonts for Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
