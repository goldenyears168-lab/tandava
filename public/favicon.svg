<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Tandava">
  <defs>
    <!-- Brand gold for the letterform -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5B84A"/>
      <stop offset="50%" stop-color="#D4A72C"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </linearGradient>
    <!-- Brand primary gradient (teal -> pink) for the breath arc -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FD1C5"/>
      <stop offset="100%" stop-color="#F687B3"/>
    </linearGradient>
  </defs>

  <!-- Deep plum app-icon background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0F0A14"/>

  <!-- Breath / movement arc in brand gradient -->
  <path d="M14 22 Q32 14 50 22" fill="none" stroke="url(#brand)"
        stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Elegant serif "T" letterform -->
  <g fill="url(#gold)">
    <!-- Horizontal bar with slight taper -->
    <path d="M16 27 L48 27 L47 31 L17 31 Z"/>
    <!-- Left serif -->
    <path d="M14 26 L18 26 L17 31 L15 31 Z"/>
    <!-- Right serif -->
    <path d="M46 26 L50 26 L49 31 L47 31 Z"/>
    <!-- Vertical stem with organic taper -->
    <path d="M29 31 L35 31 L34 50 Q32 51.5 30 50 Z"/>
    <!-- Base serif -->
    <path d="M25 49 Q32 45.5 39 49 L39 52 Q32 50 25 52 Z"/>
  </g>
</svg>
